questions:
  - "SF Pro fonts are Apple proprietary — OK for private/internal use, needs license for public production"

decisions:
  - section_order: "Problem/Solution before Cases — matches live site narrative (problem→solution→proof)"
  - gradient_approach: "Massive organic blobs (180% width, 80px blur, animated drift) instead of contained gradient box — creates the alive, dreamy feel from the live site"
  - team_grid_unified: "All 16 members (including advisors) in same 4-col grid, advisors distinguished by blue role text"
  - discovery_layout: "Text LEFT, image RIGHT — matching live spaik.io"
  - footer_logomark: "200px at 8% opacity — large but subtle SPAIK signature"
  - scroll_animations: "ScrollStagger component with IntersectionObserver + CSS transitions — no scroll listeners, no Framer Motion dependency"
  - lenis_autoraf: "Switched from manual rAF loop to autoRaf:true — eliminates permanent main thread blocking"
  - carousel_fix: "Removed destructive key prop + useCallback for timer — prevents DOM remount on every slide"

findings:
  - six_agent_review: "Running 6 review agents in parallel (security, perf, arch, TS, patterns, simplicity) gives 25 findings in ~5 minutes — documented in docs/solutions/"
  - image_waste: "40+ unused images (7.3MB) accumulated from earlier sessions — always audit with grep before shipping"
  - gradient_blobs_not_boxes: "Contained gradient boxes look artificial. Massive blurred blobs (>100% width, 60-80px blur, animated) create the organic feel"
  - sips_png_warning: "macOS sips INCREASES PNG file size when resizing — use pngquant for PNG compression"
  - video_t_param: "HTML5 video #t=N skips first N seconds — simple fix for bad intro frames"

worked:
  - "ScrollStagger component with IntersectionObserver for staggered reveals — lightweight, no deps"
