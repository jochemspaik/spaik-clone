blockers: []

questions:
  - Services card fold/unfold animation — how close to Framer's implementation do we need?
  - Team section — 8 of 14 members use placeholder initials (no photos). Download from LinkedIn or accept?

decisions:
  - cases_carousel: Replaced stacked cards with interactive carousel — more impactful, better mobile, avoids Framer positioning complexity
  - warm_gray_bg: ProblemSolution section uses rgb(243,237,237) not dark/light split — matches original
  - rolling_text_simplified: Single text slide instead of per-letter cascade — more reliable, still premium feel
  - lenis_smooth_scroll: Installed lenis package for native-feeling smooth scroll matching Framer original

findings:
  - original_is_framer: spaik.io is built in Framer with Lenis smooth scroll, custom @font-face (IvyPresto, SF Pro), and many absolutely-positioned decorative layers
  - person_photos_layered: Original cases section layers watercolor overlay PNG on top of actual person photos
  - max_width_pattern: Every section on original uses maxWidth 1080px with padding 80px 40px — the consistent layout rhythm
  - framer_uses_display_contents: Many wrapper divs use display:contents which complicates DOM extraction

worked:
  - Parallel worktree agents for component building (4 agents, each 3-5 components)
  - Browser extraction via Playwright evaluate for exact computed styles
  - Brand assets folder (/Users/jochemvanlaren/Documents/SPAIK/SPAIK Branding (1)/) has SVG icons, gradients, textures
  - ScrollReveal with viewport check on mount prevents blank sections

failed:
  - First pass builder agents got high-level descriptions instead of exact CSS — produced generic components
  - case-person.png was semi-transparent watercolor, not actual person photo — needed separate downloads per CEO
  - icon-marketing.png was actually Joran's headshot, not a department icon — Framer CDN naming is misleading
  - ScrollReveal initially hid all sections including above-fold content — needed SSR-safe implementation

next:
  - Run gstack /design-review on localhost:3000 for systematic visual audit with scoring
  - Fix Services section — cards are static, original has fold/unfold animation with image headers
  - Mobile responsive polish — test at 390px, fix any overflow or stacking issues
  - Side-by-side comparison of each section against original screenshots in docs/design-references/
  - Typography fine-tuning — verify heading sizes, line-heights, letter-spacing per section
  - Consider deploying to Vercel for real-device testing

